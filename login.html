<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 克鲁赛德战记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f7f3eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            background: #fff;
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .login-box h2 {
            text-align: center;
            color: #79552c;
            margin-bottom: 30px;
            font-size: 26px;
            border-left: 5px solid #d4af37;
            padding-left: 10px;
        }
        .input-box {
            margin-bottom: 22px;
        }
        .input-box label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 15px;
        }
        .input-box input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        .input-box input:focus {
            border-color: #d4af37;
        }
        .login-btn {
            width: 100%;
            padding: 15px;
            background-color: #d4af37;
            color: #222;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .login-btn:hover {
            background-color: #c09e27;
        }
        .reg-tip {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .reg-tip a {
            color: #d4af37;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>账号登录</h2>
        <div class="input-box">
            <label>用户名</label>
            <input type="text" id="username" placeholder="请输入用户名">
        </div>
        <div class="input-box">
            <label>密码</label>
            <input type="password" id="pwd" placeholder="请输入登录密码">
        </div>
        <button class="login-btn" onclick="userLogin()">立即登录</button>
        <div class="reg-tip">还没有账号？<a href="register.html">点击立即注册</a></div>
    </div>

<script>
function userLogin(){
    let username = document.getElementById('username').value.trim();
    let pwd = document.getElementById('pwd').value.trim();
    let userList = JSON.parse(localStorage.getItem('userData')) || [];
    let ok = false;

    for(let i=0;i<userList.length;i++){
        if(userList[i].name === username && userList[i].password === pwd){
            ok = true;
            localStorage.setItem('isLogin','true');
            localStorage.setItem('loginUser',username);
            alert('登录成功！');
            location.href = 'pages/home/index.html';
            return;
        }
    }
    if(!ok) alert('用户名或密码错误！');
}
</script>
</body>
</html>
