    <h1 class="story-title">幻想神殿</h1>
    <img src="../../../images/temple.png" alt="幻想神殿" class="story-img">
    <div class="story-content">
        <p>众人深入探查阴谋真相的途中，不幸遭遇遗迹守护者的猛烈袭击，仓促应战之下队伍伤亡惨重，全员身负重伤，无奈之下只能先行退回皇城之内调养伤势。</p>

        <br>

        <p>养伤休整的日子里，众人暂时放下外界纷争安心疗伤，就在此时，众人收到了考古学者罗蕾莱送来的紧急信件。信中言辞恳切，诉说着考古挖掘工作遭遇重重阻碍，急需强大勇士前往相助。</p>

        <br>

        <p>伤势稍有恢复，心怀热忱的艾丽便主动提议前往支援。一行人收拾行装再度出发，一同奔赴充满未知与危险的远古幻想神殿，踏入这座埋藏无数远古秘密、危机四伏的古老遗迹之中，开启新一轮探险之旅。</p>
    </div>
</div>

<script>
const pageTitle = document.title;
const pageUrl = window.location.href;
const time = new Date().toLocaleString();
const record = {title:pageTitle,url:pageUrl,time:time};
let historyList = JSON.parse(localStorage.getItem("storyHistory")) || [];
historyList = historyList.filter(item => item.url !== pageUrl);
historyList.unshift(record);
if(historyList.length > 10) historyList = historyList.slice(0,10);
localStorage.setItem("storyHistory",JSON.stringify(historyList));
</script>
